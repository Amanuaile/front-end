<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Flow | Task Manager</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <main class="app-container">
        <header>
            <h1>Focus Flow</h1>
            <p>Master your day, one task at a time.</p>
        </header>

        <form id="task-form">
            <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off">
            <button type="submit" id="add-btn">Add Task</button>
        </form>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div id="empty-state" class="empty-state">
            <p>No tasks for today! Enjoy your free time.</p>
        </div>

        <ul id="task-list"></ul>
    </main>

    <script src="../js/app.js"></script>
</body>
</html>
